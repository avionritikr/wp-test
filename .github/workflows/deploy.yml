name: CI/CD Pipeline for WordPress

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v2

      # Step 2: Debugging the private key
      - name: Debug Key
        run: |
          ls -la ec2_key.pem  # List the key to verify if it was created with correct permissions
          cat ec2_key.pem     # Print the key (for debugging only; remove this in production)

      # Step 3: Setup MySQL
      - name: Setup MySQL
        env:
          MYSQL_USER: wpuser
          MYSQL_PASSWORD: password  # Your existing wpuser password
          MYSQL_DATABASE: wordpress
        run: |
          # Attempt to connect to MySQL using wpuser
          mysql -u $MYSQL_USER -p$MYSQL_PASSWORD -e "SHOW DATABASES;"
          
      # Step 4: SSH and run deployment commands on the EC2 instance
      - name: SSH and Deploy
        env:
          EC2_PUBLIC_IP: 34.204.74.69
          EC2_KEY: ${{ secrets.EC2_KEY_BASE64 }}  # Base64 encoded key
        run: |
          echo $EC2_KEY | base64 --decode > ec2_key.pem
          chmod 600 ec2_key.pem  # Set correct permissions for the key

          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@$EC2_PUBLIC_IP \
            "cd /var/www/html && git pull origin main && sudo systemctl restart apache2"

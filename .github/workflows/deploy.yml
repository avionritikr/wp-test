name: CI/CD Pipeline for WordPress

on:
  push:
    branches:
      - main  # Trigger on pushes to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the code
    - name: Checkout code
      uses: actions/checkout@v2

    # Step 2: Set up PHP and MySQL
    - name: Set up PHP and MySQL
      run: |
        sudo apt update
        sudo apt install -y apache2 php libapache2-mod-php php-mysql mysql-server
        # Secure the MySQL installation and set root password
        sudo mysql_secure_installation

    # Step 3: Set up MySQL database for testing
    - name: Setup MySQL for Testing
      env:
        MYSQL_ROOT_PASSWORD: your_root_password_here  # Replace with your actual MySQL root password
      run: |
        sudo service mysql start
        # Execute MySQL commands using the root password
        sudo mysql -u root -p$MYSQL_ROOT_PASSWORD -e "CREATE DATABASE IF NOT EXISTS wordpress;"
        sudo mysql -u root -p$MYSQL_ROOT_PASSWORD -e "CREATE USER IF NOT EXISTS 'wpuser'@'localhost' IDENTIFIED BY 'password';"
        sudo mysql -u root -p$MYSQL_ROOT_PASSWORD -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'localhost';"
        sudo mysql -u root -p$MYSQL_ROOT_PASSWORD -e "FLUSH PRIVILEGES;"

    # Step 4: Run Tests (add your testing commands here)
    - name: Run Tests
      run: |
        # Example: Run PHPUnit tests
        # You should have PHPUnit installed and configured for your WordPress setup
        # ./vendor/bin/phpunit

    # Step 5: Deploy to Live Server if tests pass
    - name: Deploy to Live Server
      if: github.ref == 'refs/heads/main'  # Only deploy on main branch
      env:
        EC2_PUBLIC_IP: "34.204.74.69"  # Replace with your EC2 instance's public IP
        EC2_KEY_BASE64: ${{ secrets.EC2_KEY_BASE64 }}
      run: |
        # Decode the base64-encoded private key and save it as ec2_key.pem
        echo "$EC2_KEY_BASE64" | base64 --decode > ec2_key.pem
        chmod 600 ec2_key.pem  # Set appropriate permissions for the key file

        # SSH and run deployment commands on the EC2 instance
        ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@$EC2_PUBLIC_IP \
          "cd /var/www/html && git pull origin main && sudo systemctl restart apache2"

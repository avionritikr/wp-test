name: CI/CD Pipeline for WordPress

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PEM key
        env:
          EC2_KEY_BASE64: ${{ secrets.EC2_KEY_BASE64 }}
        run: |
          # Decode the base64-encoded private key and save it as ec2_key.pem
          echo "$EC2_KEY_BASE64" | base64 --decode > ec2_key.pem
          # Set appropriate permissions for the key file
          chmod 600 ec2_key.pem

      - name: Debug Key  # This step is for debugging; remove or comment it out once confirmed
        run: |
          ls -la ec2_key.pem  # Verify that the key exists with correct permissions
          cat ec2_key.pem     # Display the key (remove this line in production)

      - name: SSH into EC2 and Deploy
        env:
          EC2_PUBLIC_IP: "34.204.74.69"
        run: |
          # SSH and run deployment commands on the EC2 instance
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@$EC2_PUBLIC_IP \
          "cd /var/www/html && git pull origin main && sudo systemctl restart apache2"

name: CI/CD Pipeline for WordPress

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Decode EC2 Key
        env:
          EC2_KEY: ${{ secrets.EC2_KEY_BASE64 }}
        run: |
          echo $EC2_KEY | base64 --decode > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Debug Key
        run: |
          ls -la ec2_key.pem
          cat ec2_key.pem

      - name: Setup MySQL
        env:
          MYSQL_USER: wpuser
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: wordpress
        run: |
          mysql -u $MYSQL_USER -p$MYSQL_PASSWORD -e "SHOW DATABASES;"
          
      - name: SSH and Deploy
        env:
          EC2_PUBLIC_IP: 34.204.74.69
        run: |
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@$EC2_PUBLIC_IP \
            "cd /var/www/html && git pull origin main && sudo systemctl restart apache2"

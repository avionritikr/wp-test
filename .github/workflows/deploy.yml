name: CI/CD Pipeline for WordPress

on:
  push:
    branches:
      - main  # Trigger on pushes to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Decode the PEM key and set permissions
      - name: Set up PEM key
        env:
          EC2_KEY_BASE64: ${{ secrets.EC2_KEY_BASE64 }}  # Reference your base64-encoded private key in GitHub Secrets
        run: |
          # Decode the base64 private key and save it as ec2_key.pem
          echo "$EC2_KEY_BASE64" | base64 --decode > ec2_key.pem
          # Restrict permissions on the private key file
          chmod 600 ec2_key.pem

      # Step 3: SSH into EC2 and deploy
      - name: SSH into EC2 and Deploy
        env:
          EC2_PUBLIC_IP: "34.204.74.69"  # Replace with your EC2 instance's public IP
        run: |
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@$EC2_PUBLIC_IP \
            "cd /var/www/html && git pull origin main && sudo systemctl restart apache2"
